<!DOCTYPE html>
<html lang="en">
<head>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=Inter:wght@400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    background: #f7f2e8;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Inter', sans-serif;
    padding: 2rem 1rem;
  }

  .card {
    background: #fffdf7;
    border: 1px solid #d4c9a8;
    border-radius: 20px;
    padding: 2.5rem 2rem;
    max-width: 380px;
    width: 100%;
    text-align: center;
  }

  .logo-ring {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    background: #163316;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 1.25rem;
    border: 3px solid #c8a84b;
  }

  .brand-name {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    font-weight: 500;
    color: #163316;
    line-height: 1.3;
    margin-bottom: 6px;
  }

  .brand-tagline {
    font-size: 12px;
    color: #7a6a3a;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 2rem;
  }

  .divider {
    border: none;
    border-top: 1px solid #e0d5b8;
    margin: 0 0 1.5rem;
  }

  .link-btn {
    display: flex;
    align-items: center;
    gap: 14px;
    width: 100%;
    padding: 14px 18px;
    border-radius: 12px;
    border: 1px solid #d4c9a8;
    background: #f7f2e8;
    color: #163316;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 500;
    text-decoration: none;
    margin-bottom: 10px;
    transition: background 0.15s, border-color 0.15s, transform 0.1s;
    cursor: pointer;
  }

  .link-btn:hover {
    background: #ede5cc;
    border-color: #c8a84b;
    transform: translateY(-1px);
  }

  .link-btn:active { transform: translateY(0); }

  .btn-icon {
    width: 38px;
    height: 38px;
    border-radius: 9px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .btn-icon svg { display: block; }

  .icon-wa { background: #d4edda; }
  .icon-ig { background: #f8e1ec; }
  .icon-drive { background: #ddeeff; }

  .btn-text { text-align: left; flex: 1; }
  .btn-label { font-size: 14px; font-weight: 500; color: #163316; }
  .btn-sub { font-size: 11px; color: #7a6a3a; margin-top: 1px; }

  .qr-section {
    margin-top: 1.75rem;
    padding-top: 1.5rem;
    border-top: 1px solid #e0d5b8;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }

  .qr-label {
    font-size: 11px;
    color: #7a6a3a;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  #qrcode {
    background: white;
    padding: 10px;
    border-radius: 10px;
    border: 1px solid #d4c9a8;
    display: inline-block;
  }

  .footer {
    margin-top: 1.5rem;
    font-size: 11px;
    color: #a89a70;
  }
</style>
</head>
